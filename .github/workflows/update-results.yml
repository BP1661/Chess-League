name: update-results

# Fetches fresh chess.com data, aggregates it, and commits the results so
# GitHub Pages redeploys automatically.

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: {} # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch and aggregate results
        run: node scripts/fetch-results.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/results.json data/cache
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: update chess league results ($(date -u +'%Y-%m-%dT%H:%MZ'))"
            git push
          fi
